name: Sync Bandi Incentivi

on:
  schedule:
    - cron: '0 3 * * *'   # ogni notte alle 03:00 UTC
  workflow_dispatch:        # permette avvio manuale dal tab Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: node scripts/sync-bandi-locale.js
